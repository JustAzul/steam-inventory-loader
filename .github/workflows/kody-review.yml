name: Kody Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: read

jobs:
  kody-review:
    if: github.event.pull_request.user.login == 'JustAzul'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::247988977671:role/github-actions-kody
          aws-region: us-east-2

      - name: Ensure Kody infrastructure is running
        run: |
          STATE=$(aws ec2 describe-instances --instance-ids i-0a5065955987011c3 \
            --query 'Reservations[0].Instances[0].State.Name' --output text)

          if [ "$STATE" = "stopped" ]; then
            echo "Starting EC2 instance..."
            aws ec2 start-instances --instance-ids i-0a5065955987011c3
            aws ec2 wait instance-status-ok --instance-ids i-0a5065955987011c3
          elif [ "$STATE" = "running" ]; then
            echo "EC2 already running"
          else
            echo "EC2 in state: $STATE, waiting..."
            aws ec2 wait instance-status-ok --instance-ids i-0a5065955987011c3
          fi

          DESIRED=$(aws ecs describe-services --cluster kody --services kody \
            --query 'services[0].desiredCount' --output text)

          if [ "$DESIRED" = "0" ]; then
            echo "Scaling ECS service to 1..."
            aws ecs update-service --cluster kody --service kody --desired-count 1 > /dev/null
          else
            echo "ECS service already at desired count: $DESIRED"
          fi

      - name: Wait for Kody healthy
        run: |
          for i in $(seq 1 30); do
            RUNNING=$(aws ecs describe-services --cluster kody --services kody \
              --query 'services[0].runningCount' --output text)
            if [ "$RUNNING" = "1" ]; then
              echo "Kody is running! Waiting 60s for containers to initialize..."
              sleep 60
              exit 0
            fi
            echo "Attempt $i/30: running=$RUNNING, waiting 10s..."
            sleep 10
          done
          echo "::warning::Kody did not reach healthy state in 5 minutes"

      - name: Wait for review
        run: |
          echo "Waiting 5 minutes for GitHub webhook retry + Kody review..."
          sleep 300
